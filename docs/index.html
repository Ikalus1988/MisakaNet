<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>御坂网络 — 节点统计</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;700;900&family=JetBrains+Mono:wght@400;700&display=swap');
  
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background: #0d1117;
    color: #e6edf3;
    font-family: 'Noto Sans SC', sans-serif;
    min-height: 100vh;
  }
  
  .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
  
  /* Header */
  .header {
    text-align: center;
    margin-bottom: 48px;
  }
  
  .logo {
    font-size: 48px;
    margin-bottom: 8px;
  }
  
  .title {
    font-size: 32px;
    font-weight: 900;
    letter-spacing: 4px;
    margin-bottom: 4px;
  }
  
  .subtitle {
    font-size: 14px;
    color: #58a6ff;
    letter-spacing: 6px;
    text-transform: uppercase;
    font-weight: 700;
  }
  
  /* Stats Cards */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
    margin-bottom: 40px;
  }
  
  .stat-card {
    background: linear-gradient(145deg, #161b22, #0d1117);
    border: 1px solid #21262d;
    border-radius: 16px;
    padding: 28px 20px;
    text-align: center;
    transition: border-color 0.2s;
  }
  
  .stat-card:hover { border-color: #30363d; }
  
  .stat-number {
    font-family: 'JetBrains Mono', monospace;
    font-size: 42px;
    font-weight: 700;
    color: #f0f6fc;
    line-height: 1;
    margin-bottom: 8px;
  }
  
  .stat-number.loading { color: #484f58; }
  
  .stat-label {
    font-size: 13px;
    color: #8b949e;
    font-weight: 400;
  }
  
  .stat-sub {
    font-size: 11px;
    color: #484f58;
    margin-top: 6px;
    font-family: 'JetBrains Mono', monospace;
  }
  
  /* Section */
  .section-title {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 16px;
    color: #f0f6fc;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  
  .section-title span { color: #58a6ff; font-weight: 400; }
  
  /* Recent list */
  .recent-list {
    background: #161b22;
    border: 1px solid #21262d;
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 40px;
  }
  
  .recent-item {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 20px;
    border-bottom: 1px solid #21262d;
    transition: background 0.15s;
  }
  
  .recent-item:last-child { border-bottom: none; }
  .recent-item:hover { background: #1c2128; }
  
  .recent-avatar {
    width: 40px;
    height: 40px;
    border-radius: 8px;
    image-rendering: pixelated;
    border: 1px solid #30363d;
    flex-shrink: 0;
  }
  
  .recent-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    font-weight: 700;
    color: #f0f6fc;
    flex: 1;
  }
  
  .recent-date {
    font-size: 12px;
    color: #484f58;
    font-family: 'JetBrains Mono', monospace;
  }
  
  .recent-order {
    font-size: 11px;
    color: #58a6ff;
    font-weight: 700;
    background: rgba(88,166,255,0.1);
    padding: 2px 10px;
    border-radius: 20px;
  }
  
  .loading-item {
    padding: 30px;
    text-align: center;
    color: #484f58;
  }
  
  .error-item {
    padding: 30px;
    text-align: center;
    color: #f85149;
  }
  
  /* Avatar Gallery */
  .avatar-gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
    gap: 10px;
    margin-bottom: 40px;
  }
  
  .gallery-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 8px;
    background: #161b22;
    border: 1px solid #21262d;
    border-radius: 10px;
    transition: border-color 0.2s;
  }
  
  .gallery-item:hover { border-color: #58a6ff; }
  
  .gallery-avatar {
    width: 48px;
    height: 48px;
    border-radius: 8px;
    image-rendering: pixelated;
  }
  
  .gallery-id {
    font-size: 9px;
    color: #484f58;
    font-family: 'JetBrains Mono', monospace;
    text-align: center;
    word-break: break-all;
  }
  
  /* Footer */
  .footer {
    text-align: center;
    padding: 24px 0;
    font-size: 12px;
    color: #30363d;
    border-top: 1px solid #21262d;
  }
  
  .footer a { color: #58a6ff; text-decoration: none; }
  .footer a:hover { text-decoration: underline; }
  
  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #484f58;
  }
  
  .empty-state .big-icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state .desc { font-size: 14px; line-height: 1.6; }
  .empty-state .cta-btn {
    display: inline-block;
    margin-top: 20px;
    padding: 10px 24px;
    background: #238636;
    color: white;
    border-radius: 8px;
    text-decoration: none;
    font-weight: 700;
    font-size: 14px;
  }
  
  @media (max-width: 600px) {
    .stats-grid { grid-template-columns: 1fr; }
    .recent-item { flex-wrap: wrap; }
  }
</style>
</head>
<body>

<div class="container">
  
  <div class="header">
    <div class="logo">🧠⚡</div>
    <div class="title">御坂网络</div>
    <div class="subtitle">Misaka Network · 节点统计</div>
  </div>
  
  <!-- Stats -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-number" id="total-nodes">—</div>
      <div class="stat-label">已注册节点</div>
      <div class="stat-sub" id="total-suffix"></div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="latest-number">—</div>
      <div class="stat-label">最新节点编号</div>
      <div class="stat-sub" id="latest-time"></div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="knowledge-count">—</div>
      <div class="stat-label">网络知识数</div>
      <div class="stat-sub">lessons</div>
    </div>
  </div>
  
  <!-- Recent Registrations -->
  <div class="section-title">📋 最新注册 <span id="recent-count"></span></div>
  <div class="recent-list" id="recent-list">
    <div class="loading-item">加载中...</div>
  </div>
  
  <!-- All Avatars -->
  <div class="section-title">🎨 节点头像墙 <span id="gallery-count"></span></div>
  <div class="avatar-gallery" id="avatar-gallery">
    <div class="loading-item">加载中...</div>
  </div>
  
  <div class="footer">
    <a href="https://github.com/Ikalus1988/MisakaNet" target="_blank">Ikalus1988/MisakaNet</a>
    · Apache 2.0 · 数据来自 GitHub API
  </div>
</div>

<script>
const REPO = "Ikalus1988/MisakaNet";
const BASE = "https://api.github.com/repos/" + REPO;
const RAW_BASE = "https://raw.githubusercontent.com/" + REPO + "/main";
const AVATAR_URL = (id) => `${RAW_BASE}/avatars/Misaka${String(id).padStart(5, "0")}.png`;

async function fetchJSON(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

async function loadStats() {
  try {
    // 1. Counter
    const counter = await fetchJSON(`${RAW_BASE}/counter.json`);
    const current = counter.current;
    const totalNodes = current - 10000;
    
    document.getElementById("total-nodes").textContent = totalNodes;
    document.getElementById("total-nodes").classList.remove("loading");
    document.getElementById("total-suffix").textContent = `起始 10000 · 当前 ${current}`;
    document.getElementById("latest-number").textContent = current;
    document.getElementById("latest-time").textContent = `更新 ${counter.updated.slice(0, 10)}`;
    
    // 2. Knowledge count
    try {
      const lessons = await fetchJSON(`${RAW_BASE}/lessons.json`);
      document.getElementById("knowledge-count").textContent = lessons.length;
    } catch {
      document.getElementById("knowledge-count").textContent = "22";
    }
    
    // 3. Recent registrations (from Issues)
    loadRecentRegistrations();
    loadAvatarGallery(current);
    
  } catch (err) {
    document.getElementById("total-nodes").textContent = "?";
    document.querySelectorAll(".loading-item").forEach(el => {
      el.textContent = `加载失败: ${err.message}`;
      el.className = "error-item";
    });
  }
}

async function loadRecentRegistrations() {
  const list = document.getElementById("recent-list");
  
  try {
    const issues = await fetchJSON(
      `${BASE}/issues?labels=registration&state=all&sort=created&direction=desc&per_page=15`
    );
    
    const displayIssues = issues.filter(i => !i.pull_request);
    
    if (displayIssues.length === 0) {
      list.innerHTML = '<div class="loading-item">暂无注册记录</div>';
      return;
    }
    
    document.getElementById("recent-count").textContent = `(${displayIssues.length})`;
    
    list.innerHTML = displayIssues.map((issue, idx) => {
      // Try to extract the number from comments or title
      const nth = displayIssues.length - idx;
      const number = 10000 + nth;
      const date = new Date(issue.created_at).toISOString().slice(0, 10);
      const avatarSrc = AVATAR_URL(number);
      
      return `
        <div class="recent-item">
          <img class="recent-avatar" src="${avatarSrc}" 
               alt="Misaka${number}" loading="lazy"
               onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 40 40%22><rect fill=%22%23161b22%22 width=%2240%22 height=%2240%22/><text fill=%22%23484f58%22 font-size=%2210%22 x=%225%22 y=%2226%22>?</text></svg>'">
          <div class="recent-order">#${nth}</div>
          <div class="recent-name">Misaka${String(number).padStart(5, "0")}</div>
          <div class="recent-date">${date}</div>
        </div>
      `;
    }).join("");
    
  } catch (err) {
    list.innerHTML = `<div class="error-item">加载失败: ${err.message}</div>`;
  }
}

async function loadAvatarGallery(current) {
  const gallery = document.getElementById("avatar-gallery");
  const total = current - 10000;
  
  if (total <= 0) {
    gallery.innerHTML = `
      <div class="empty-state" style="grid-column: 1/-1;">
        <div class="big-icon">🧠</div>
        <div class="desc">还没有节点加入御坂网络<br>你是第一个吗？</div>
        <a class="cta-btn" href="https://github.com/${REPO}" target="_blank">加入御坂网络</a>
      </div>`;
    return;
  }
  
  document.getElementById("gallery-count").textContent = `(${Math.min(total, 200)})`;
  
  // Show max 200 avatars
  const start = Math.max(10001, current - 199);
  const html = [];
  
  for (let i = start; i <= current; i++) {
    html.push(`
      <div class="gallery-item">
        <img class="gallery-avatar" src="${AVATAR_URL(i)}" 
             alt="Misaka${i}" loading="lazy"
             onerror="this.style.display='none'">
        <div class="gallery-id">Misaka${i}</div>
      </div>
    `);
  }
  
  gallery.innerHTML = html.join("");
}

loadStats();
</script>
</body>
</html>

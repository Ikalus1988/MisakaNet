<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FANUC RAG 知识库 — Misaka Network</title>
<meta name="description" content="190份FANUC手册 · 200,835向量 · 95.2%召回率">
<link rel="stylesheet" href="/shared/css/system.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body class="fanuc">

<div class="page">
  <!-- Header -->
  <div class="header-row">
    <a href="/" class="back-link">← Misaka Network</a>
    <span style="font-size:.75rem;color:var(--text-dim)">状态：边缘节点联机 · 延迟：12ms · 数据版本：2026Q2</span>
  </div>

  <header style="text-align:center;margin-bottom:2.5rem">
    <h1 style="font-size:2rem;font-weight:800;color:var(--fanuc);margin-bottom:.5rem">⚡ FANUC RAG 知识库</h1>
    <p style="color:var(--text-dim);font-size:.9rem">190 份技术手册 · 200,835 向量 · 飞书群即问即答</p>
  </header>

  <!-- Stats -->
  <div class="card-grid">
    <div class="card"><div class="card-num">200,835</div><div class="card-label">文档向量</div></div>
    <div class="card"><div class="card-num" style="color:var(--green)">95.2%</div><div class="card-label">有效召回率</div></div>
    <div class="card"><div class="card-num">190+</div><div class="card-label">FANUC PDF</div></div>
    <div class="card"><div class="card-num">飞书</div><div class="card-label">查询入口</div></div>
  </div>

  <!-- Search -->
  <div class="search-box">
    <label>🔍 知识库检索</label>
    <div class="search-row">
      <input type="text" id="query" class="search-input" placeholder="SRVO-023 报警怎么处理..."
             onkeydown="if(event.key==='Enter')search()">
      <button class="btn" onclick="search()">搜索</button>
    </div>
    <div id="result" class="result-area"></div>
  </div>

  <!-- Links -->
  <div class="card-grid" style="grid-template-columns:repeat(auto-fit,minmax(240px,1fr))">
    <a href="https://ikalus1988.github.io/rag-journey/" target="_blank" class="card-link">
      <span class="card-link-icon">📊</span>
      <div><div class="card-link-title">演进旅程</div><div class="card-link-desc">从 PDF 入库到自进化</div></div>
    </a>
    <a href="https://github.com/Ikalus1988/self-grow-wiki" target="_blank" class="card-link">
      <span class="card-link-icon">📦</span>
      <div><div class="card-link-title">源码仓库</div><div class="card-link-desc">self-grow-wiki</div></div>
    </a>
    <div class="card-link">
      <span class="card-link-icon">🤖</span>
      <div><div class="card-link-title">飞书接入</div><div class="card-link-desc">群内 @正义 即问即答</div></div>
    </div>
    <div class="card-link">
      <span class="card-link-icon">🔬</span>
      <div><div class="card-link-title">质量飞轮</div><div class="card-link-desc">每日巡检 · 自动进化</div></div>
    </div>
  </div>

  <footer class="page-footer">
    RAG 知识库 · <a href="https://github.com/Ikalus1988/self-grow-wiki">self-grow-wiki</a> · 2026
  </footer>
</div>

<script>
async function search() {
  const q = document.getElementById('query').value.trim();
  const r = document.getElementById('result');
  if (!q) return;
  r.style.display = 'block';
  r.innerHTML = '<span class="pulse" style="color:var(--text-dim)">检索中…</span>';
  try {
    const resp = await fetch('http://localhost:8002/query', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({query:q, top_k:3})
    });
    if (!resp.ok) throw new Error('RAG 服务不可用');
    const data = await resp.json();
    r.innerHTML = `<div class="result-ok">✅ 检索完成</div>
      <pre>${escapeHtml(data.answer||'无结果')}</pre>`;
  } catch(e) {
    r.innerHTML = `<div class="result-err">⚠️ 本地 RAG 服务未连接 — 请通过飞书 @正义 查询，或访问 <a href="https://ikalus1988.github.io/rag-journey/">演进页面</a></div>`;
  }
}
function escapeHtml(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MisakaNet — Newcomer Journey</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0d1117;
    color: #c9d1d9;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
  }
  h1 {
    font-size: 1.5rem;
    font-weight: 600;
    color: #58a6ff;
    margin-bottom: 0.25rem;
  }
  .subtitle {
    color: #8b949e;
    font-size: 0.9rem;
    margin-bottom: 2rem;
  }
  .container {
    max-width: 780px;
    width: 100%;
  }
  .progress-bar {
    display: flex;
    justify-content: space-between;
    margin-bottom: 2rem;
    padding: 0 0.5rem;
  }
  .step-dot {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.4rem;
    flex: 1;
    position: relative;
  }
  .step-dot::after {
    content: '';
    position: absolute;
    top: 12px;
    left: 50%;
    width: 100%;
    height: 2px;
    background: #21262d;
    z-index: 0;
  }
  .step-dot:last-child::after { display: none; }
  .step-dot.active::after { background: #58a6ff; }
  .step-dot.done::after { background: #3fb950; }
  .dot {
    width: 24px; height: 24px;
    border-radius: 50%;
    background: #21262d;
    border: 2px solid #30363d;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    z-index: 1;
    transition: all 0.4s;
  }
  .step-dot.active .dot { border-color: #58a6ff; background: #1f3a5f; }
  .step-dot.done .dot { border-color: #3fb950; background: #1a4a2a; }
  .dot-label {
    font-size: 0.65rem;
    color: #8b949e;
    text-align: center;
    white-space: nowrap;
  }
  .step-dot.active .dot-label { color: #58a6ff; }
  .step-dot.done .dot-label { color: #3fb950; }

  .card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 1.5rem;
    margin-bottom: 1rem;
    min-height: 200px;
    position: relative;
  }
  .card-header {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 1rem;
    padding-bottom: 0.75rem;
    border-bottom: 1px solid #21262d;
  }
  .card-header .icon {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    flex-shrink: 0;
  }
  .icon-gh { background: #333; }
  .icon-bot { background: #1f3a5f; }
  .icon-user { background: #1a4a2a; }
  .icon-ci { background: #5a3e1a; }
  .card-header .name { font-weight: 600; font-size: 0.9rem; }
  .card-header .tag {
    font-size: 0.7rem;
    padding: 0.15rem 0.5rem;
    border-radius: 12px;
    background: #21262d;
    color: #8b949e;
    margin-left: auto;
  }
  .card-body { font-size: 0.88rem; line-height: 1.6; color: #c9d1d9; }
  .card-body .highlight { color: #58a6ff; }
  .card-body .success { color: #3fb950; }
  .card-body .warn { color: #d29922; }
  .card-body .error { color: #f85149; }
  .card-body code {
    background: #0d1117;
    padding: 0.1rem 0.3rem;
    border-radius: 4px;
    font-size: 0.8rem;
    color: #ffa657;
  }
  .card-body pre {
    background: #0d1117;
    padding: 0.75rem;
    border-radius: 6px;
    border: 1px solid #21262d;
    overflow-x: auto;
    font-size: 0.78rem;
    line-height: 1.5;
    margin: 0.5rem 0;
  }
  .card-body pre .comment { color: #8b949e; }
  .card-body pre .cmd { color: #ffa657; }
  .card-body pre .out { color: #7ee787; }
  .card-body pre .err { color: #f85149; }

  .terminal-line { display: block; }
  .check-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.4rem 0;
    border-bottom: 1px solid #21262d;
  }
  .check-row:last-child { border-bottom: none; }
  .check-row .status {
    width: 20px; height: 20px;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    flex-shrink: 0;
  }
  .status-pass { background: #1a4a2a; color: #3fb950; }
  .status-fail { background: #4a1a1a; color: #f85149; }
  .status-pending { background: #3a2a1a; color: #d29922; }

  .btn {
    padding: 0.6rem 1.5rem;
    border-radius: 6px;
    border: 1px solid #30363d;
    background: #21262d;
    color: #c9d1d9;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 1rem;
  }
  .btn:hover { background: #30363d; border-color: #58a6ff; }
  .btn-primary { background: #238636; border-color: #2ea043; color: #fff; }
  .btn-primary:hover { background: #2ea043; }

  .controls { display: flex; gap: 0.5rem; justify-content: center; margin-top: 1.5rem; flex-wrap: wrap; }
  .hidden { display: none; }
  .fade-in { animation: fadeIn 0.5s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .log {
    background: #0d1117;
    border: 1px solid #21262d;
    border-radius: 6px;
    padding: 0.75rem;
    font-size: 0.78rem;
    font-family: monospace;
    max-height: 200px;
    overflow-y: auto;
    margin-top: 1rem;
  }
  .log .line { padding: 0.1rem 0; color: #8b949e; }
  .log .line.info { color: #58a6ff; }
  .log .line.ok { color: #3fb950; }
  .log .line.err { color: #f85149; }
  .log .line.warn { color: #d29922; }
  .log .line.audit { color: #79c0ff; }
  .log .line.scan { color: #d2a8ff; }
  .log .line.merge { color: #ffa657; }

  .ring-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    padding: 0.15rem 0.6rem;
    border-radius: 12px;
    font-size: 0.7rem;
    font-weight: 600;
    margin-left: 0.5rem;
  }
  .ring-1 { background: rgba(88,166,255,0.15); color: #58a6ff; border: 1px solid rgba(88,166,255,0.3); }
  .ring-2 { background: rgba(210,168,255,0.15); color: #d2a8ff; border: 1px solid rgba(210,168,255,0.3); }
  .ring-3 { background: rgba(63,185,80,0.15); color: #3fb950; border: 1px solid rgba(63,185,80,0.3); }

  .badge {
    display: inline-block;
    padding: 0.2rem 0.5rem;
    border-radius: 12px;
    font-size: 0.7rem;
    margin-right: 0.3rem;
  }
  .badge-green { background: #1a4a2a; color: #3fb950; }
  .badge-red { background: #4a1a1a; color: #f85149; }
  .badge-blue { background: #1f3a5f; color: #58a6ff; }
  .badge-yellow { background: #3a2a1a; color: #d29922; }

  .node-graph {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin: 1rem 0;
  }
  .node-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0.5rem 0.75rem;
    border: 1px solid #30363d;
    border-radius: 6px;
    background: #0d1117;
    font-size: 0.75rem;
  }
  .node-item .num { font-size: 0.6rem; color: #8b949e; }
  .arrow { color: #30363d; font-size: 1.2rem; }
</style>
</head>
<body>
<div class="container">
  <h1>⚡ MisakaNet Newcomer Journey</h1>
  <p class="subtitle" style="margin-bottom:0.5rem;">Understand → Search → Use → Feedback → Optional Contribution</p>
  <div style="text-align:center;margin-bottom:0.75rem;">
    <span style="display:inline-block;padding:0.2rem 0.8rem;border:1px solid #30363d;border-radius:12px;font-size:0.7rem;color:#8b949e;background:#0d1117;">No GitHub account needed. No PR required.</span>
  </div>

  <div class="progress-bar" id="progressBar"></div>
  <div id="cardArea" class="card fade-in"></div>
  <div id="logArea" class="log hidden"></div>
  <div class="controls" id="controls"></div>
</div>

<script>
const STEPS = [
  { id: 'understand', label: 'Understand', icon: '💡' },
  { id: 'search', label: 'Search', icon: '🔍' },
  { id: 'use', label: 'Use', icon: '📖' },
  { id: 'feedback', label: 'Feedback', icon: '💬' },
  { id: 'contribute', label: 'Contribute', icon: '📤' },
];

let currentStep = -1;
let autoMode = false;
let autoTimer = null;

function renderProgress() {
  const bar = document.getElementById('progressBar');
  bar.innerHTML = STEPS.map((s, i) => `
    <div class="step-dot ${i < currentStep ? 'done' : i === currentStep ? 'active' : ''}">
      <div class="dot">${i < currentStep ? '✓' : i === currentStep ? s.icon : ''}</div>
      <div class="dot-label">${s.label}</div>
    </div>
  `).join('');
}

function addLog(msg, type = 'auto') {
  const area = document.getElementById('logArea');
  area.classList.remove('hidden');
  const div = document.createElement('div');
  if (type === 'auto') {
    if (/Audit|审计|Score|coverage/i.test(msg)) type = 'audit';
    else if (/Scan|扫描|discover|发现/i.test(msg)) type = 'scan';
    else if (/Merge|合并|merged/i.test(msg)) type = 'merge';
    else if (/✅|pass|Success|成功|ok/i.test(msg)) type = 'ok';
    else if (/❌|fail|Error|error|missing|blocked/i.test(msg)) type = 'err';
    else if (/⚠️|warn|WARN/i.test(msg)) type = 'warn';
    else type = 'info';
  }
  div.className = `line ${type}`;
  div.textContent = msg;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function clearLog() {
  const area = document.getElementById('logArea');
  area.innerHTML = '';
  area.classList.add('hidden');
}

function renderStep(idx) {
  const card = document.getElementById('cardArea');
  card.classList.remove('fade-in');
  void card.offsetWidth;
  card.classList.add('fade-in');
  currentStep = idx;
  renderProgress();
  updateControls();

  const s = STEPS[idx];
  switch (s.id) {
    case 'understand': renderUnderstand(card); break;
    case 'search': renderSearch(card); break;
    case 'use': renderUse(card); break;
    case 'feedback': renderFeedback(card); break;
    case 'contribute': renderContribute(card); break;
  }
}

function renderUnderstand(card) {
  addLog('Visiting MisakaNet for the first time...');
  setTimeout(() => addLog('Reading README: what is MisakaNet?'), 300);
  setTimeout(() => addLog('Lesson ≠ Skill — lessons are failure memories for agents'), 600);
  card.innerHTML = `
    <div class="card-header">
      <div class="icon">💡</div>
      <div class="name">Understand MisakaNet</div>
      <span class="tag">Step 1</span>
    </div>
    <div class="card-body">
      <p>MisakaNet is a <span class="highlight">shared failure-memory layer</span> for developers and agents.</p>
      <div style="background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:1rem;margin:0.75rem 0;">
        <div style="display:flex;gap:1rem;flex-wrap:wrap;">
          <div style="flex:1;min-width:200px;">
            <div style="font-weight:600;color:#58a6ff;margin-bottom:0.5rem;">📖 Lesson</div>
            <div style="color:#8b949e;font-size:0.85rem;">
              Failure experience / debugging knowledge<br>
              <span style="color:#3fb950;">Helps agents avoid repeating known failures</span>
            </div>
          </div>
          <div style="flex:1;min-width:200px;">
            <div style="font-weight:600;color:#d29922;margin-bottom:0.5rem;">🔧 Skill</div>
            <div style="color:#8b949e;font-size:0.85rem;">
              Executable capability / workflow / tool<br>
              <span style="color:#8b949e;">Helps agents complete tasks</span>
            </div>
          </div>
        </div>
      </div>
      <p style="color:#8b949e;font-size:0.85rem;">You don't need to understand everything. Just know: <span style="color:#c9d1d9;">when something breaks, search here first.</span></p>
    </div>
  `;
}

function renderSearch(card) {
  addLog('Opening search page...');
  setTimeout(() => addLog('Searching: "GitHub token 401"'), 400);
  setTimeout(() => addLog('Found: github-401-credential-lookup (score: 0.89)'), 800);
  card.innerHTML = `
    <div class="card-header">
      <div class="icon">🔍</div>
      <div class="name">Search for a Lesson</div>
      <span class="tag">Step 2</span>
    </div>
    <div class="card-body">
      <pre><span class="cmd">python3 search_knowledge.py "GitHub token 401"</span>

<span class="out">📋 lessons/  (2 matches)</span>
<span class="out">──────────────────────────────────────────────────</span>
<span class="out">  [core]    github-401-credential-lookup       0.89   🟢 high/actionable</span>
<span class="out">            Fix: check ~/.git-credentials before asking for a new PAT.</span>

<span class="out">  [contrib] github-api-rate-limit-handling     0.71   🟢 high/actionable</span>
<span class="out">            Fix: use conditional requests with ETag headers.</span></pre>
      <div style="margin-top:0.75rem;">
        <a href="https://ikalus1988.github.io/MisakaNet/search/" target="_blank" style="display:inline-flex;align-items:center;gap:0.3rem;padding:0.4rem 0.8rem;border:1px solid #238636;border-radius:6px;color:#3fb950;text-decoration:none;font-size:0.85rem;background:#0d1117;">
          🔍 Open Search Page →
        </a>
      </div>
    </div>
  `;
}

function renderUse(card) {
  addLog('Reading lesson: github-401-credential-lookup...');
  setTimeout(() => addLog('Applying fix: check local credentials first'), 400);
  setTimeout(() => addLog('Problem resolved without opening an issue'), 700);
  card.innerHTML = `
    <div class="card-header">
      <div class="icon">📖</div>
      <div class="name">Use the Lesson</div>
      <span class="tag">Step 3</span>
    </div>
    <div class="card-body">
      <p>You found a matching lesson. Read it and apply the fix:</p>
      <div style="background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:1rem;margin:0.75rem 0;">
        <div style="font-weight:600;color:#58a6ff;">github-401-credential-lookup</div>
        <div style="color:#8b949e;font-size:0.85rem;margin-top:0.5rem;">
          <strong>Problem:</strong> GitHub API returns 401 Bad credentials<br>
          <strong>Root cause:</strong> Agent asks for new PAT instead of checking local credentials<br>
          <strong>Fix:</strong> Check ~/.git-credentials, ~/.netrc, gh auth status first
        </div>
      </div>
      <p style="color:#8b949e;font-size:0.85rem;">
        If the lesson helped: great, you're done.<br>
        If it didn't: tell us — that's feedback.
      </p>
    </div>
  `;
}

function renderFeedback(card) {
  addLog('Opening feedback path...');
  setTimeout(() => addLog('Options: email, journey report, or issue comment'), 400);
  card.innerHTML = `
    <div class="card-header">
      <div class="icon">💬</div>
      <div class="name">Send Feedback</div>
      <span class="tag">Step 4</span>
    </div>
    <div class="card-body">
      <p>You don't need a GitHub account. You don't need to write a PR.</p>
      <div style="display:flex;gap:0.75rem;flex-wrap:wrap;margin:0.75rem 0;">
        <a href="mailto:bot@misakanet.org" style="flex:1;min-width:180px;display:flex;flex-direction:column;gap:0.3rem;padding:0.75rem;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;text-decoration:none;background:#0d1117;">
          <span style="font-weight:600;">📧 Email</span>
          <span style="color:#8b949e;font-size:0.8rem;">bot@misakanet.org</span>
          <span style="color:#8b949e;font-size:0.75rem;">Send a screenshot, a one-liner, or just "it didn't work"</span>
        </a>
        <a href="https://github.com/Ikalus1988/MisakaNet/issues/510" target="_blank" style="flex:1;min-width:180px;display:flex;flex-direction:column;gap:0.3rem;padding:0.75rem;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;text-decoration:none;background:#0d1117;">
          <span style="font-weight:600;">🚶 Journey Report</span>
          <span style="color:#8b949e;font-size:0.8rem;">#510</span>
          <span style="color:#8b949e;font-size:0.75rem;">Walk through the repo and report where you got stuck</span>
        </a>
        <a href="https://github.com/Ikalus1988/MisakaNet/issues/new?template=lesson-feedback.yml" target="_blank" style="flex:1;min-width:180px;display:flex;flex-direction:column;gap:0.3rem;padding:0.75rem;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;text-decoration:none;background:#0d1117;">
          <span style="font-weight:600;">📝 Lesson Feedback</span>
          <span style="color:#8b949e;font-size:0.8rem;">5-line form</span>
          <span style="color:#8b949e;font-size:0.75rem;">Tell us which lesson helped (or didn't)</span>
        </a>
      </div>
      <p style="color:#8b949e;font-size:0.85rem;">
        Negative feedback is welcome. "I don't understand X" is more useful than "everything is fine."
      </p>
    </div>
  `;
}

function renderContribute(card) {
  addLog('Optional: contributing to MisakaNet...');
  setTimeout(() => addLog('Many ways to contribute — PR is just one of them'), 400);
  card.innerHTML = `
    <div class="card-header">
      <div class="icon">📤</div>
      <div class="name">Contribute (Optional)</div>
      <span class="tag">Step 5</span>
    </div>
    <div class="card-body">
      <p>PR is optional. There are many ways to contribute:</p>
      <div style="background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:1rem;margin:0.75rem 0;">
        <div style="display:flex;flex-direction:column;gap:0.5rem;">
          <div><span style="color:#3fb950;">✓</span> Report friction via email</div>
          <div><span style="color:#3fb950;">✓</span> Write a journey report</div>
          <div><span style="color:#3fb950;">✓</span> Share a debugging story</div>
          <div><span style="color:#3fb950;">✓</span> Submit a lesson candidate</div>
          <div><span style="color:#3fb950;">✓</span> Fix a typo in docs</div>
          <div><span style="color:#58a6ff;">○</span> Open a PR (if you want to)</div>
        </div>
      </div>
      <div style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-top:0.75rem;">
        <a href="https://github.com/Ikalus1988/MisakaNet/labels/good%20first%20issue" target="_blank" style="display:inline-flex;align-items:center;gap:0.3rem;padding:0.4rem 0.8rem;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;text-decoration:none;font-size:0.85rem;background:#0d1117;">
          🏷️ Good First Issues
        </a>
        <a href="https://github.com/Ikalus1988/MisakaNet/labels/bounty" target="_blank" style="display:inline-flex;align-items:center;gap:0.3rem;padding:0.4rem 0.8rem;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;text-decoration:none;font-size:0.85rem;background:#0d1117;">
          💰 Bounties
        </a>
        <a href="docs/label-system.md" style="display:inline-flex;align-items:center;gap:0.3rem;padding:0.4rem 0.8rem;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;text-decoration:none;font-size:0.85rem;background:#0d1117;">
          📋 Label System
        </a>
      </div>
    </div>
  `;
}

function updateControls() {
  const c = document.getElementById('controls');
  const isLast = currentStep === STEPS.length - 1;
  const isFirst = currentStep === 0;
  c.innerHTML = `
    <button class="btn" onclick="goStep(-1)" ${isFirst ? 'disabled style="opacity:0.4"' : ''}>← Back</button>
    ${!autoMode ?
      `<button class="btn" onclick="toggleAuto()">▶ Auto Play</button>` :
      `<button class="btn btn-primary" onclick="toggleAuto()">⏸ Pause</button>`
    }
    <button class="btn btn-primary" onclick="goStep(1)" ${isLast ? 'disabled style="opacity:0.5"' : ''}>Next →</button>
    ${isLast ? '<button class="btn" onclick="resetJourney()">🔄 Restart</button>' : ''}
  `;
}

function goStep(dir) {
  if (autoMode && dir > 0) { stopAuto(); }
  const next = currentStep + dir;
  if (next < 0 || next >= STEPS.length) return;
  clearLog();
  renderStep(next);
}

function toggleAuto() {
  if (autoMode) { stopAuto(); }
  else { startAuto(); }
}

function startAuto() {
  autoMode = true;
  updateControls();
  if (currentStep >= STEPS.length - 1) { resetJourney(); return; }
  clearLog();
  renderStep(currentStep + 1);
  autoTimer = setTimeout(() => {
    if (currentStep < STEPS.length - 1 && autoMode) startAuto();
    else stopAuto();
  }, 3000);
}

function stopAuto() {
  autoMode = false;
  if (autoTimer) { clearTimeout(autoTimer); autoTimer = null; }
  updateControls();
}

function resetJourney() {
  stopAuto();
  clearLog();
  renderStep(0);
}

// Init
renderStep(0);
</script>
</body>
</html>

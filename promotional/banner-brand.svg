<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&amp;family=Inter:wght@400;500;600;700;800&amp;display=swap');
      .brand { font-family: 'Orbitron', 'Arial Black', sans-serif; }
      .ui { font-family: 'Inter', 'Segoe UI', sans-serif; }
      .mono { font-family: 'IBM Plex Mono', 'Courier New', monospace; }
    </style>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#060912"/>
      <stop offset="48%" stop-color="#0b1324"/>
      <stop offset="100%" stop-color="#131124"/>
    </linearGradient>
    <radialGradient id="glow" cx="30%" cy="42%" r="56%">
      <stop offset="0%" stop-color="#9ff5ff" stop-opacity="0.14"/>
      <stop offset="35%" stop-color="#54e8ff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="55%" stop-color="#cdefff"/>
      <stop offset="100%" stop-color="#88bfff"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6aefff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#7f6dff" stop-opacity="0.28"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#7ea2ff" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="cardShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#020611" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="900" height="480" fill="url(#bg)"/>
  <rect width="900" height="480" fill="url(#grid)"/>
  <rect width="900" height="480" fill="url(#glow)"/>

  <g opacity="0.55">
    <path d="M0 394 C154 306, 296 282, 440 300 S718 358, 900 272" fill="none" stroke="url(#lineGrad)" stroke-width="2.4"/>
    <path d="M0 430 C180 350, 312 346, 476 360 S726 404, 900 348" fill="none" stroke="#79ebff" stroke-opacity="0.16" stroke-width="1.5"/>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="54" y="74" width="280" height="332" rx="34" fill="#0b1220" fill-opacity="0.72" stroke="#82eefe" stroke-opacity="0.18"/>
    <circle cx="194" cy="190" r="126" fill="#7cecff" fill-opacity="0.07"/>
    <image href="../avatars/Misaka10001.png" x="74" y="94" width="240" height="240" image-rendering="pixelated"/>
    <ellipse cx="194" cy="214" rx="122" ry="98" fill="none" stroke="#84efff" stroke-opacity="0.2" stroke-width="2" stroke-dasharray="8 10" filter="url(#softGlow)">
      <animate attributeName="stroke-dashoffset" from="0" to="80" dur="7s" repeatCount="indefinite"/>
    </ellipse>
    <text x="86" y="370" class="mono" font-size="10" fill="#79edff">MISAKA NETWORK / TERMINAL UNIT</text>
    <text x="86" y="396" class="ui" font-size="30" font-weight="800" fill="#f4fbff">Misaka #10001</text>
  </g>

  <g>
    <text x="394" y="102" class="mono" font-size="10" fill="#80efff">MISAKA NETWORK / KEY VISUAL TYPE-B</text>
    <text x="388" y="176" class="brand" font-size="78" font-weight="900" fill="url(#titleGrad)">MisakaNet</text>
    <line x1="390" y1="196" x2="804" y2="196" stroke="url(#lineGrad)" stroke-width="2"/>
    <text x="388" y="236" class="ui" font-size="30" font-weight="800" fill="#f8feff">Safe. Useful. Zero-Dep.</text>
    <text x="388" y="278" class="ui" font-size="18" fill="#bccce4">A local-first agent library expressed as a synchronized network terminal.</text>
    <text x="388" y="310" class="ui" font-size="16" fill="#98adc8">No server dependency, no hidden platform lock-in, shared skills across linked nodes.</text>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="388" y="340" width="232" height="68" rx="24" fill="#0e1727" fill-opacity="0.8" stroke="#80efff" stroke-opacity="0.16"/>
    <text x="412" y="366" class="mono" font-size="10" fill="#7decff">positioning</text>
    <text x="412" y="391" class="ui" font-size="15" fill="#ecf8ff" font-weight="700">Safe · Useful · Zero-Dep</text>

    <rect x="640" y="340" width="182" height="68" rx="24" fill="#121525" fill-opacity="0.82" stroke="#8c7bff" stroke-opacity="0.14"/>
    <text x="664" y="366" class="mono" font-size="10" fill="#a896ff">identity</text>
    <text x="664" y="391" class="ui" font-size="15" fill="#f2efff" font-weight="700">Shared Skills Node</text>
  </g>

  <g opacity="0.62">
    <text x="494" y="438" class="mono" font-size="10" fill="#7487a1">node:#10001 | role: terminal | mode: local-first | shared-skills | license: Apache-2.0</text>
  </g>
</svg>

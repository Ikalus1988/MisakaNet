<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&amp;family=Inter:wght@400;500;600;700;800&amp;display=swap');
      .brand { font-family: 'Orbitron', 'Arial Black', sans-serif; }
      .ui { font-family: 'Inter', 'Segoe UI', sans-serif; }
      .mono { font-family: 'IBM Plex Mono', 'Courier New', monospace; }
    </style>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#02040a"/>
      <stop offset="52%" stop-color="#050816"/>
      <stop offset="100%" stop-color="#0a0d1f"/>
    </linearGradient>
    <radialGradient id="hairGrad" cx="40%" cy="22%" r="86%">
      <stop offset="0%" stop-color="#f6ffff"/>
      <stop offset="28%" stop-color="#d7edff"/>
      <stop offset="56%" stop-color="#a9c4ff"/>
      <stop offset="82%" stop-color="#8c86df"/>
      <stop offset="100%" stop-color="#433d73"/>
    </radialGradient>
    <linearGradient id="hairShadow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d8f7ff" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#5f6bb9" stop-opacity="0.78"/>
    </linearGradient>
    <linearGradient id="skinGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5fbff"/>
      <stop offset="100%" stop-color="#d1dfec"/>
    </linearGradient>
    <linearGradient id="coatGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1020"/>
      <stop offset="52%" stop-color="#17152d"/>
      <stop offset="100%" stop-color="#05070d"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#edf6ff"/>
      <stop offset="45%" stop-color="#9ec9ff"/>
      <stop offset="100%" stop-color="#8d86e2"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="900" height="480" fill="url(#bg)"/>

  <g opacity="0.78">
    <path d="M72 86 h72" stroke="#68b9ff" stroke-width="2"/>
    <path d="M108 50 v72" stroke="#68b9ff" stroke-width="2"/>
    <path d="M86 64 l44 44" stroke="#4f7fff" stroke-width="2"/>
    <path d="M86 108 l44 -44" stroke="#4f7fff" stroke-width="2"/>
    <rect x="56" y="84" width="8" height="2" fill="#7ef6ff"/>
    <rect x="150" y="84" width="8" height="2" fill="#8f7dff"/>
    <rect x="106" y="38" width="2" height="8" fill="#7ef6ff"/>
    <rect x="106" y="126" width="2" height="8" fill="#8f7dff"/>
  </g>

  <g opacity="0.56">
    <rect x="706" y="74" width="11" height="2" fill="#7dc0ff"/>
    <rect x="748" y="112" width="18" height="2" fill="#7dc0ff"/>
    <rect x="798" y="98" width="6" height="2" fill="#8f7dff"/>
    <rect x="770" y="354" width="18" height="2" fill="#5ea2ff"/>
    <rect x="818" y="332" width="9" height="2" fill="#8f7dff"/>
    <rect x="98" y="354" width="10" height="2" fill="#4f7fff"/>
    <rect x="130" y="378" width="5" height="2" fill="#7ef6ff"/>
  </g>

  <g>
    <text x="58" y="44" class="brand" font-size="34" font-weight="900" fill="url(#titleGrad)">Pixel girl</text>
    <text x="60" y="63" class="mono" font-size="9" fill="#8e98bc">2026.05.x.x</text>
  </g>

  <g>
    <ellipse cx="340" cy="230" rx="176" ry="194" fill="#0d1120" fill-opacity="0.44"/>
    <image href="./misaka-avatar-crop.png" x="152" y="26" width="386" height="480" preserveAspectRatio="xMidYMid slice"/>
  </g>

  <g>
    <text x="542" y="116" class="mono" font-size="10" fill="#8ca5ca">MISAKA NETWORK / PIXEL COLD NODE</text>
    <text x="538" y="178" class="brand" font-size="56" font-weight="900" fill="url(#titleGrad)" letter-spacing="1.6">MisakaNet</text>
    <text x="540" y="218" class="ui" font-size="26" font-weight="800" fill="#f4fbff">Safe. Useful. Zero-Dep.</text>
    <text x="540" y="252" class="ui" font-size="16" fill="#b8c7e2">Synchronized clone node.</text>
  </g>

  <g>
    <rect x="538" y="302" width="222" height="62" rx="20" fill="#0d1423" fill-opacity="0.82" stroke="#6baef7" stroke-opacity="0.16"/>
    <text x="560" y="328" class="mono" font-size="10" fill="#8bc2ff">status</text>
    <text x="560" y="350" class="ui" font-size="15" fill="#edf6ff" font-weight="700">clone sync stable</text>

    <rect x="538" y="378" width="260" height="34" rx="17" fill="#12182c" stroke="#8c82df" stroke-opacity="0.14"/>
    <text x="558" y="399" class="mono" font-size="10" fill="#a29adf">shared skills · local-first shell</text>
  </g>
</svg>
name: Thank Merged PR Contributor

on:
  pull_request:
    types: [closed]

permissions:
  pull-requests: write

jobs:
  thank:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Thank contributor
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUM="${{ github.event.pull_request.number }}"
          AUTHOR="${{ github.event.pull_request.user.login }}"
          TITLE="${{ github.event.pull_request.title }}"
          ADDITIONS="${{ github.event.pull_request.additions }}"
          FILES="${{ github.event.pull_request.changed_files }}"

          # Skip bot accounts
          if echo "$AUTHOR" | grep -qiE "bot|dependabot|actions|github"; then
            echo "Skipping bot account: $AUTHOR"
            exit 0
          fi

          # Check if this is the author's first merged PR
          PREVIOUS=$(gh pr list --repo ${{ github.repository }} --author "$AUTHOR" --state merged --limit 10 --json number --jq 'length' 2>/dev/null || echo "0")

          # Choose message based on first-time vs returning
          if [ "$PREVIOUS" -le 1 ]; then
            # First-time contributor — peak dopamine moment
            BODY="🎉 **Congratulations, @${AUTHOR}! Your PR has been merged!**

          You are now an official contributor to MisakaNet — the Swarm Knowledge Network for AI Agents.

          **What you just built:** ${TITLE} (+${ADDITIONS} lines across ${FILES} files)

          ### ⭐ Show the world you're a contributor
          Give MisakaNet a Star — your contributor badge will shine on your GitHub profile forever:
          👉 [⭐ Star this repo](https://github.com/Ikalus1988/MisakaNet)

          ### 🚀 What's next?
          - 🏷️ Your name is now on the [Contributor Leaderboard](https://ikalus1988.github.io)
          - 🔍 Browse [open bounties](https://github.com/Ikalus1988/MisakaNet/issues?q=is%3Aissue+is%3Aopen+label%3Abounty) for your next contribution
          - 💬 Join [Discussions](https://github.com/Ikalus1988/MisakaNet/discussions) to connect with other contributors

          One node learns, all nodes benefit. Welcome aboard. ⚡"
          else
            # Returning contributor
            BODY="✅ **Merged!** Thanks again, @${AUTHOR}.

          **${TITLE}** (+${ADDITIONS} lines, ${FILES} files)

          Your contributions are making MisakaNet's knowledge base stronger. Every lesson helps another agent skip a failure path.

          ⭐ If you haven't already, [give us a Star](https://github.com/Ikalus1988/MisakaNet) — it helps more contributors find us! ⚡"
          fi

          gh pr comment "$PR_NUM" --repo ${{ github.repository }} --body "$BODY"
          echo "Thanked @$AUTHOR on PR #$PR_NUM"

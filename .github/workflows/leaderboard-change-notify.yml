name: Leaderboard #1 Change Notification

on:
  push:
    paths:
      - 'data/leaderboard.json'
    branches:
      - main

permissions:
  issues: write
  contents: read

jobs:
  check-leaderboard-change:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: 🔍 Check if #1 changed
        id: check
        run: |
          # Get current #1
          CURRENT=$(jq -r '.[0].login' data/leaderboard.json)
          CURRENT_SCORE=$(jq -r '.[0].score' data/leaderboard.json)

          # Get previous #1
          PREVIOUS=$(git show HEAD~1:data/leaderboard.json 2>/dev/null | jq -r '.[0].login' 2>/dev/null || echo "none")
          PREVIOUS_SCORE=$(git show HEAD~1:data/leaderboard.json 2>/dev/null | jq -r '.[0].score' 2>/dev/null || echo "0")

          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "current_score=$CURRENT_SCORE" >> $GITHUB_OUTPUT
          echo "previous=$PREVIOUS" >> $GITHUB_OUTPUT
          echo "previous_score=$PREVIOUS_SCORE" >> $GITHUB_OUTPUT

          if [ "$CURRENT" != "$PREVIOUS" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "🏆 Leaderboard #1 changed: $PREVIOUS → $CURRENT"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No change in #1 position"
          fi

      - name: 📢 Create announcement issue
        if: steps.check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT="${{ steps.check.outputs.current }}"
          CURRENT_SCORE="${{ steps.check.outputs.current_score }}"
          PREVIOUS="${{ steps.check.outputs.previous }}"
          PREVIOUS_SCORE="${{ steps.check.outputs.previous_score }}"

          # Get top 5 leaderboard
          TOP5=$(jq -r '.[0:5] | to_entries[] | "| \(.key + 1) | @\(.value.login) | \(.value.score) |"' data/leaderboard.json)

          BODY="## 🏆 Leaderboard #1 has changed!

          **New Leader:** @$CURRENT (score: $CURRENT_SCORE)
          **Previous Leader:** @$PREVIOUS (score: $PREVIOUS_SCORE)

          ### Current Top 5

          | Rank | Contributor | Score |
          |------|-------------|-------|
          $TOP5

          Congratulations to @$CURRENT for reaching the top of the leaderboard! 🎉

          ---
          *This issue was auto-generated by the leaderboard change notification workflow.*"

          gh issue create \
            --repo "${{ github.repository }}" \
            --title "🏆 Leaderboard #1: @$CURRENT overtakes @$PREVIOUS" \
            --body "$BODY" \
            --label "announcement,leaderboard"
